name: Deploy TurboReader

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "turboreader-production"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      REMOTE_DIR: /home/${{ secrets.SERVER_USER }}/projects/TurboReader/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Validate deploy configuration
        run: |
          test -n "$SERVER_HOST" || { echo "SERVER_HOST secret is missing"; exit 1; }
          test -n "$SERVER_USER" || { echo "SERVER_USER secret is missing"; exit 1; }

      - name: Trust server host key
        run: ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p '$REMOTE_DIR'"

      - name: Sync static bundle
        run: rsync -az --delete dist/ "$SERVER_USER@$SERVER_HOST:$REMOTE_DIR/"

      - name: Reload Nginx
        run: ssh "$SERVER_USER@$SERVER_HOST" "sudo -n nginx -t && sudo systemctl reload nginx"
